<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- font awesome cdnjs -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- tailwind and daisy link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- english + bangla font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- stylesheet css linked -->
    <link rel="stylesheet" href="./style/style.css" />

    <!-- fav icon -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />

    <title>English Janala Web Application</title>
  </head>
  <body>
    <!-- header section -->
    <header>
      <div class="navbar bg-base-100 shadow-sm">
        <!-- responsive navbar -->
        <div class="navbar-start">
          <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost md:hidden">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <li>
                <button><i class="fa-solid fa-circle-question"></i> FAQ</button>
              </li>
              <li>
                <button><i class="fa-solid fa-book-open"></i> Learn</button>
              </li>
              <li>
                <button>
                  <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                </button>
              </li>
            </ul>
          </div>
          <!-- logo update -->
          <a class="flex gap-1 items-center ml-1" href=""
            ><span class="text-lg font-bold">English</span>
            <img src="./assets/logo.png" alt="" />
            <span class="text-lg font-semibold font-bangla">জানালা</span>
          </a>
        </div>
        <!-- navbar btn setup -->
        <div class="navbar-end hidden md:flex">
          <ul class="menu menu-horizontal px-1 space-x-4">
            <li>
              <button class="btn btn-outline btn-primary">
                <i class="fa-solid fa-circle-question"></i> FAQ
              </button>
            </li>
            <li>
              <button class="btn btn-outline btn-primary">
                <i class="fa-solid fa-book-open"></i> Learn
              </button>
            </li>
            <li>
              <button class="btn btn-outline btn-primary">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </header>

    <!-- hero section -->
    <section
      class="flex flex-col-reverse text-center gap-8 md:flex-row md:text-start justify-between items-center w-11/12 mx-auto py-5"
    >
      <!-- content -->
      <div class="flex-1">
        <h1 class="text-5xl mb-6 font-bold">
          <span class="text-sky-600">English</span> is Easy!!
        </h1>
        <p class="font-bangla text-gray-600 font-medium text-2xl">
          আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
          আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে
          অন্য একটি Level এ
        </p>

        <!-- login form -->
        <div class="space-y-5 mt-10">
          <input
            type="name"
            class="input outline-0"
            placeholder="Enter your name"
          />
          <input
            type="password"
            class="input outline-0"
            placeholder="Password"
          />
          <br />
          <button class="btn btn-primary">Get Started</button>
        </div>
      </div>

      <!-- image  -->
      <figure class="flex-1 flex justify-end">
        <img src="./assets/hero-student.png" alt="" />
      </figure>
    </section>
  </body>
</html>
